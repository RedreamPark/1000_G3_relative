<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>관계대명사 기본 종합 복습</title>
<style>
:root{
  --bg:#F4F2EE;
  --card:#FFFFFF;
  --border:rgba(0,0,0,0.08);
  --text:#1C1C1C;
  --muted:#6B6B6B;
  --green:#1D9E75;
  --green-d:#0F6E56;
  --green-l:#E1F5EE;
  --green-deep:#085041;
  --red:#C0392B;
  --red-l:#FDECEA;
  --red-deep:#5C1A14;
  --amber:#D97706;
  --blue:#1A5FAD;
  --blue-l:#E8F0FB;
  --blue-deep:#0C2F5A;
  --purple:#6B3FA0;
  --purple-l:#F0EAF9;
  --purple-deep:#2E1248;
  --r:14px;
  --rs:9px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;}
#app{max-width:680px;margin:0 auto;padding:18px 14px 80px;}

.brand{text-align:center;font-size:11px;font-weight:800;letter-spacing:0.18em;color:var(--green);text-transform:uppercase;margin-bottom:14px;}

.intro-title{font-size:24px;font-weight:800;line-height:1.3;margin-bottom:6px;text-align:center;}
.intro-sub{font-size:13px;color:var(--muted);margin-bottom:20px;text-align:center;}
.unit-badge{display:inline-block;background:var(--green-l);color:var(--green-deep);padding:5px 12px;border-radius:99px;font-size:11px;font-weight:700;margin-bottom:14px;}

.block{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;}
.block-title{font-size:12px;font-weight:800;color:var(--green-deep);margin-bottom:10px;letter-spacing:0.04em;text-transform:uppercase;}

.section-list{display:flex;flex-direction:column;gap:8px;}
.section-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#FAFAF7;border-radius:var(--rs);cursor:pointer;transition:background 0.12s;}
.section-row:hover{background:var(--green-l);}
.section-row input[type="checkbox"]{width:18px;height:18px;cursor:pointer;accent-color:var(--green);}
.section-row label{flex:1;font-size:13px;cursor:pointer;color:var(--text);}
.section-row .count{font-size:11px;color:var(--muted);font-weight:600;background:rgba(0,0,0,0.05);padding:2px 8px;border-radius:99px;}

.settings-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;padding:8px 0;border-top:1px solid var(--border);}
.settings-row label{font-size:13px;color:var(--text);font-weight:600;}
.settings-row input[type="number"]{width:70px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--rs);font-size:14px;font-family:inherit;text-align:center;}
.settings-row .max-hint{font-size:11px;color:var(--muted);}

.timer-info{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.timer-pill{flex:1;background:#FAFAF7;border-radius:var(--rs);padding:8px 10px;font-size:11px;text-align:center;}
.timer-pill strong{display:block;font-size:14px;color:var(--text);margin-bottom:2px;}
.timer-pill span{color:var(--muted);}

.history-empty{font-size:13px;color:var(--muted);text-align:center;padding:8px 0;font-style:italic;}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.04);font-size:13px;}
.history-row:last-child{border-bottom:none;}
.history-date{color:var(--muted);font-size:12px;}
.history-score{font-weight:700;color:var(--green-deep);}
.history-pct{font-size:11px;color:var(--muted);margin-left:6px;}
.history-clear{font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:8px;}

.start-btn{width:100%;padding:16px;background:var(--green);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;}
.start-btn:hover:not(:disabled){background:var(--green-d);}
.start-btn:disabled{background:#C5C5C5;cursor:not-allowed;}
.start-warn{font-size:12px;color:var(--red);text-align:center;margin-top:8px;}

.ref-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px;}
.ref-table th,.ref-table td{border:1px solid var(--border);padding:6px 8px;text-align:center;}
.ref-table th{background:#FAFAF7;color:var(--muted);font-weight:700;font-size:11px;}
.ref-table td strong{color:var(--green-deep);font-weight:700;}

.formula-block{background:#FAFAF7;padding:10px 12px;border-radius:var(--rs);font-size:12px;line-height:1.7;margin-bottom:8px;}
.formula-block .label{display:inline-block;background:var(--green);color:white;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:700;margin-right:6px;}
.formula-block code{background:rgba(0,0,0,0.05);padding:1px 5px;border-radius:4px;font-family:'Apple SD Gothic Neo',sans-serif;font-weight:600;color:var(--purple-deep);}

.notice-box{background:#FFFBE6;border-left:3px solid #D97706;padding:8px 11px;border-radius:6px;font-size:11px;line-height:1.5;color:#5A3005;margin-top:10px;}

/* QUIZ */
.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.q-counter{font-size:13px;color:var(--muted);font-weight:600;}
.q-counter strong{color:var(--text);font-size:15px;}
.exit-btn{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 8px;}

.timer-bar{height:6px;background:rgba(0,0,0,0.08);border-radius:99px;margin-bottom:6px;overflow:hidden;}
.timer-bar-fill{height:100%;background:var(--green);border-radius:99px;transition:width 1s linear, background 0.3s;}
.timer-text{text-align:right;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:12px;}
.timer-text.warn{color:var(--amber);}
.timer-text.danger{color:var(--red);}

.progress{height:3px;background:rgba(0,0,0,0.06);border-radius:99px;margin-bottom:14px;overflow:hidden;}
.progress-fill{height:100%;background:var(--text);border-radius:99px;transition:width 0.3s;}

.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;margin-bottom:14px;}

.type-badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:0.03em;margin-bottom:12px;}
.type-badge.choice{background:var(--blue-l);color:var(--blue-deep);}
.type-badge.order{background:var(--purple-l);color:var(--purple-deep);}

.q-source{display:inline-block;font-size:10px;color:var(--muted);background:rgba(0,0,0,0.04);padding:2px 7px;border-radius:99px;margin-left:5px;font-weight:600;letter-spacing:0.02em;}

.q-prompt{font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.6;}
.q-ko-label{display:inline-block;background:#FFFBE6;color:#5A3005;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600;margin-bottom:8px;}

.q-sentence{font-size:17px;line-height:1.75;color:var(--text);font-weight:500;}
.q-sentence .mark{background:#FFF3B0;font-weight:700;padding:1px 4px;border-radius:4px;}
.blank-slot{display:inline-block;min-width:50px;border-bottom:2px solid var(--purple);margin:0 3px;vertical-align:bottom;height:1.3em;}

.choices{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
.choice-btn{background:white;border:1px solid var(--border);border-radius:var(--rs);padding:13px 15px;text-align:left;font-size:15px;cursor:pointer;font-family:inherit;color:var(--text);transition:all 0.12s;display:flex;align-items:flex-start;gap:10px;line-height:1.55;}
.choice-btn:hover:not(:disabled){border-color:var(--green);background:var(--green-l);}
.choice-btn:disabled{cursor:not-allowed;}
.choice-mark{width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0;margin-top:1px;}
.choice-btn.correct{border-color:var(--green);background:var(--green-l);color:var(--green-deep);}
.choice-btn.correct .choice-mark{background:var(--green);color:white;}
.choice-btn.wrong{border-color:var(--red);background:var(--red-l);color:var(--red-deep);}
.choice-btn.wrong .choice-mark{background:var(--red);color:white;}

.order-context{background:#FAFAF7;padding:10px 12px;border-radius:var(--rs);font-size:15px;color:var(--text);margin-top:10px;line-height:1.8;}
.context-blank{display:inline-block;border-bottom:2px dashed var(--purple);min-width:80px;height:1.3em;vertical-align:bottom;margin:0 3px;}

.answer-area{background:#FAFAF7;border:1.5px dashed var(--border);border-radius:var(--rs);padding:11px 13px;min-height:52px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:10px;}
.answer-area.correct{border-color:var(--green);background:var(--green-l);border-style:solid;}
.answer-area.wrong{border-color:var(--red);background:var(--red-l);border-style:solid;}

.picked-word{background:white;border:1px solid var(--purple);color:var(--purple-deep);padding:6px 11px;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.12s;}
.picked-word:hover:not(:disabled){background:var(--red-l);border-color:var(--red);color:var(--red-deep);}
.picked-word:disabled{cursor:default;}
.answer-area.correct .picked-word{border-color:var(--green);color:var(--green-deep);background:white;}
.answer-area.wrong .picked-word{border-color:var(--red);color:var(--red-deep);background:white;}

.word-bank{margin-top:12px;display:flex;flex-wrap:wrap;gap:7px;justify-content:center;padding:11px;background:rgba(0,0,0,0.03);border-radius:var(--rs);}
.word-btn{background:white;border:1px solid var(--border);color:var(--text);padding:8px 13px;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.12s;}
.word-btn:hover:not(.used):not(:disabled){border-color:var(--purple);background:var(--purple-l);color:var(--purple-deep);}
.word-btn.used{opacity:0.22;cursor:default;}
.word-btn:disabled{cursor:default;}

.empty-hint{color:var(--muted);font-size:13px;font-style:italic;}

.submit-btn{width:100%;margin-top:12px;padding:12px;background:var(--green);color:white;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.submit-btn:disabled{background:#C5C5C5;cursor:not-allowed;}

.feedback{margin-top:13px;padding:11px 13px;border-radius:var(--rs);font-size:13px;line-height:1.55;}
.feedback.ok{background:var(--green-l);color:var(--green-deep);border-left:3px solid var(--green);}
.feedback.no{background:var(--red-l);color:var(--red-deep);border-left:3px solid var(--red);}
.feedback.timeout{background:#FEF3E2;color:#5A3005;border-left:3px solid var(--amber);}
.feedback-title{font-weight:700;margin-bottom:3px;font-size:13px;}
.correct-ans{font-weight:700;}

.next-btn{width:100%;margin-top:10px;padding:13px;background:var(--text);color:white;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}

.result-hero{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px 18px;margin-bottom:14px;text-align:center;}
.result-emoji{font-size:44px;margin-bottom:4px;}
.result-msg{font-size:15px;font-weight:700;margin-bottom:12px;}
.result-score{font-size:44px;font-weight:800;color:var(--green);line-height:1;margin-bottom:4px;}
.result-score .total{font-size:22px;color:var(--muted);font-weight:600;}
.result-percent{font-size:13px;color:var(--muted);}
.result-time{font-size:12px;color:var(--muted);margin-top:6px;}

.review-title{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:10px;letter-spacing:0.06em;text-transform:uppercase;}
.review-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:7px;}
.review-num{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:3px;letter-spacing:0.04em;}
.review-q{font-size:14px;color:var(--text);margin-bottom:5px;line-height:1.55;}
.review-q .blank-slot{min-width:40px;}
.review-q .mark{background:#FFF3B0;padding:1px 3px;border-radius:3px;font-weight:700;}
.review-ans{font-size:12px;display:flex;gap:6px;align-items:baseline;flex-wrap:wrap;}
.review-label{color:var(--muted);font-size:11px;font-weight:700;min-width:42px;}
.review-val.wrong{color:var(--red-deep);text-decoration:line-through;}
.review-val.timeout{color:var(--amber);font-style:italic;}
.review-val.correct{color:var(--green-deep);font-weight:700;}
.review-explain{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5;}

.retry-btn{width:100%;padding:13px;background:var(--green);color:white;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px;}
.review-wrong-only{width:100%;padding:13px;background:white;color:var(--text);border:1px solid var(--border);border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:7px;}
.home-btn{width:100%;padding:13px;background:white;color:var(--muted);border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:7px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
const ALL_Q = [
  // ===== s1: POINT 1 주격 관계대명사 =====
  {id:1, section:'s1', type:'choice', src:'POINT 1 880',
    sentence:'Lisa has a dog ___ has a big body and long hair.',
    choices:['which','who'], answer:'which',
    explain:'선행사가 사물/동물(a dog)이고 관계대명사절의 주어 역할이므로 주격 which (또는 that)'},
  {id:2, section:'s1', type:'choice', src:'POINT 1 881',
    sentence:"The doctor ___ works at the children's hospital is my uncle.",
    choices:['who','which'], answer:'who',
    explain:'선행사가 사람(The doctor)이고 주격이므로 who (또는 that)'},
  {id:3, section:'s1', type:'choice', src:'POINT 1 Check up 1',
    sentence:'He got a present [ ___ ] was wrapped with a red ribbon.',
    choices:['which','who'], answer:'which',
    explain:'선행사가 사물(a present)이므로 주격 which'},
  {id:4, section:'s1', type:'choice', src:'POINT 1 Check up 2',
    sentence:'The woman [ ___ ] lives next door is very friendly.',
    choices:['that','which'], answer:'that',
    explain:'선행사가 사람(The woman)이므로 who 또는 that. 보기에서 that이 정답'},
  {id:5, section:'s1', type:'choice', src:'POINT 1 Check up 3',
    sentence:'I have friends [ ___ ] came from different countries.',
    choices:['who','which'], answer:'who',
    explain:'선행사가 사람(friends)이므로 주격 who'},

  // ===== s2: POINT 2 목적격 관계대명사 =====
  {id:6, section:'s2', type:'choice', src:'POINT 2 882',
    sentence:'The boy ___ you saw this morning is my little brother.',
    choices:['who(m)','which'], answer:'who(m)',
    explain:'선행사가 사람(The boy)이고 목적격이므로 who(m) (또는 that)'},
  {id:7, section:'s2', type:'choice', src:'POINT 2 883',
    sentence:'I read the novel ___ Sam recommended last week.',
    choices:['which','who(m)'], answer:'which',
    explain:'선행사가 사물(the novel)이고 목적격이므로 which (또는 that)'},
  {id:8, section:'s2', type:'order', src:'POINT 2 Check up 1',
    prompt:'네가 나에게 소개해 준 그 사람은 아주 친절하다. (who, introduce)',
    before:'The person', after:'to me is very gentle.',
    words:['who','you','introduced'],
    answer:'who you introduced',
    explain:'사람 선행사 The person + 목적격 who + 주어(you) + 동사(introduced)'},
  {id:9, section:'s2', type:'order', src:'POINT 2 Check up 2',
    prompt:'그가 매일 사용했던 그 컵이 없어졌다. (which, use)',
    before:'The cup', after:'every day disappeared.',
    words:['which','he','used'],
    answer:'which he used',
    explain:'사물 선행사 The cup + 목적격 which + 주어(he) + 동사(used)'},

  // ===== s3: POINT 3 소유격 whose =====
  {id:10, section:'s3', type:'choice', src:'POINT 3 885',
    sentence:'John likes songs ___ lyrics are touching.',
    choices:['whose','which'], answer:'whose',
    explain:'소유격 관계대명사 whose: their lyrics → whose lyrics. whose 뒤에는 반드시 명사가 옴'},
  {id:11, section:'s3', type:'choice', src:'POINT 3 886',
    sentence:'Do you know the boy ___ name is Noah?',
    choices:['whose','who'], answer:'whose',
    explain:'his name → whose name. 소유격이므로 whose'},
  {id:12, section:'s3', type:'order', src:'POINT 3 Check up 1',
    prompt:'나는 나이가 100살이 넘은 거북이를 보았다. (Its age, turtle) - 소유격 관계대명사 사용',
    before:'I saw a turtle', after:'.',
    words:['whose','age','is','over','100','years','old'],
    answer:'whose age is over 100 years old',
    explain:'Its age → whose age. 소유격 whose + 명사(age) + 동사(is)'},
  {id:13, section:'s3', type:'order', src:'POINT 3 Check up 2',
    prompt:'그녀는 색깔이 검정과 흰색인 신발을 샀다. (Their colors)',
    before:'She bought shoes', after:'.',
    words:['whose','colors','are','black','and','white'],
    answer:'whose colors are black and white',
    explain:'Their colors → whose colors. 소유격 whose + 명사 + 동사'},
  {id:14, section:'s3', type:'order', src:'POINT 3 Check up 3',
    prompt:'숙제가 늦은 그 학생은 선생님께 사과했다. (His homework)',
    before:'The student', after:'apologized to the teacher.',
    words:['whose','homework','was','late'],
    answer:'whose homework was late',
    explain:'His homework → whose homework. 소유격 whose + 명사 + 동사'},

  // ===== s4: POINT 4 관계대명사 what =====
  {id:15, section:'s4', type:'choice', src:'POINT 4 887',
    sentence:'___ I want for lunch is a hamburger.',
    choices:['What','That'], answer:'What',
    explain:'관계대명사 what = the thing(s) which[that]. 선행사를 포함하므로 앞에 명사가 없음. 명사절을 이끌어 주어 역할'},
  {id:16, section:'s4', type:'choice', src:'POINT 4 888',
    sentence:"I'll do ___ I can to help you.",
    choices:['what','which'], answer:'what',
    explain:'do의 목적어. what = the thing which (내가 할 수 있는 것)'},
  {id:17, section:'s4', type:'choice', src:'POINT 4 889',
    sentence:'These clothes are ___ she ordered online.',
    choices:['what','that'], answer:'what',
    explain:'are의 보어. what = the thing(s) which (그녀가 주문한 것)'},

  // ===== s5: POINT 4 what vs that (어법 선택) =====
  {id:18, section:'s5', type:'choice', src:'POINT 4 Check up 1',
    sentence:'[ ___ ] I want to buy is that yellow skirt.',
    choices:['What','Which'], answer:'What',
    explain:'주어 자리에 선행사 없이 명사절이 와야 하므로 What. (What = the thing which)'},
  {id:19, section:'s5', type:'choice', src:'POINT 4 Check up 2',
    sentence:'We discussed the thing [ ___ ] happened during the class.',
    choices:['that','what'], answer:'that',
    explain:'선행사 the thing이 이미 있으므로 what 불가. 관계대명사 that 사용'},
  {id:20, section:'s5', type:'choice', src:'POINT 4 Check up 3',
    sentence:'Someone found your wallet [ ___ ] you lost on the street.',
    choices:['which','what'], answer:'which',
    explain:'선행사 your wallet이 있으므로 what 불가. 사물 선행사 + 목적격 which'},
  {id:21, section:'s5', type:'choice', src:'POINT 4 Check up 4',
    sentence:'We found [ ___ ] she hid in the closet.',
    choices:['what','which'], answer:'what',
    explain:'found의 목적어. 선행사 없이 명사절을 이끄는 what 필요'},

  // ===== s6: POINT 4 Check up 어순배열 =====
  {id:22, section:'s6', type:'order', src:'POINT 4 Check up 1',
    prompt:'그는 내가 쓴 것을 읽고 싶어 했다. (write) - what 사용',
    before:'He wanted to read', after:'.',
    words:['what','I','wrote'],
    answer:'what I wrote',
    explain:'read의 목적어. what + 주어(I) + 동사(wrote)'},
  {id:23, section:'s6', type:'order', src:'POINT 4 Check up 2',
    prompt:'요즘 나를 성가시게 하는 것은 위층에서 나는 소음이다. (bother) - what 사용',
    before:'', after:'these days is noise from upstairs.',

const TIMER_CHOICE = 7;
const TIMER_ORDER = 30;
const HISTORY_KEY = 'rel_pron_unit1_history_v1';

let selectedSections = ['s1','s2','s3','s4','s5','s6','s7','s8','s9'];
let userTotal = 20;
let questions = [];
let idx = 0;
let results = {};
let revealed = {};
let screen = 'intro';
let wordBanks = {};
let wordPicks = {};
let timerInterval = null;
let timeLeft = 0;
let startTime = 0;
let advancing = false;

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function getAvailableQuestions(){
  return ALL_Q.filter(q => selectedSections.includes(q.section));
}

function loadHistory(){
  try{
    const h = localStorage.getItem(HISTORY_KEY);
    return h ? JSON.parse(h) : [];
  } catch(e){ return []; }
}

function saveHistoryEntry(entry){
  const h = loadHistory();
  h.unshift(entry);
  if(h.length > 20) h.splice(20);
  try{ localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); } catch(e){}
}

function clearHistory(){
  if(!confirm('모든 학습 기록을 삭제할까요?')) return;
  try{ localStorage.removeItem(HISTORY_KEY); } catch(e){}
  render();
}

function formatDate(iso){
  const d = new Date(iso);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const yesterday = new Date(now); yesterday.setDate(yesterday.getDate()-1);
  const sameYesterday = d.toDateString() === yesterday.toDateString();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  if(sameDay) return `오늘 ${hh}:${mm}`;
  if(sameYesterday) return `어제 ${hh}:${mm}`;
  return `${d.getMonth()+1}/${d.getDate()} ${hh}:${mm}`;
}

function formatDuration(sec){
  const m = Math.floor(sec/60);
  const s = sec%60;
  if(m === 0) return `${s}초`;
  return `${m}분 ${s}초`;
}

function start(){
  const pool = getAvailableQuestions();
  if(pool.length === 0) return;
  const n = Math.min(Math.max(1, userTotal), pool.length);
  questions = shuffle(pool).slice(0, n);
  idx = 0;
  results = {};
  revealed = {};
  wordBanks = {};
  wordPicks = {};
  advancing = false;
  startTime = Date.now();
  screen = 'quiz';
  initOrder();
  render();
  startTimer();
}

function initOrder(){
  const q = questions[idx];
  if(!q || q.type !== 'order') return;
  if(wordBanks[idx]) return;
  wordBanks[idx] = shuffle(q.words);
  wordPicks[idx] = [];
}

function startTimer(){
  clearInterval(timerInterval);
  const q = questions[idx];
  const seconds = q.type === 'order' ? TIMER_ORDER : TIMER_CHOICE;
  timeLeft = seconds;
  updateTimerDisplay();
  timerInterval = setInterval(()=>{
    timeLeft--;
    if(timeLeft <= 0){
      clearInterval(timerInterval);
      onTimeout();
    } else {
      updateTimerDisplay();
    }
  }, 1000);
}

function updateTimerDisplay(){
  const q = questions[idx];
  if(!q) return;
  const seconds = q.type === 'order' ? TIMER_ORDER : TIMER_CHOICE;
  const fill = document.getElementById('timer-fill');
  const text = document.getElementById('timer-text');
  if(fill){
    const pct = Math.max(0, (timeLeft/seconds)*100);
    fill.style.width = pct + '%';
    if(timeLeft <= 3){
      fill.style.background = 'var(--red)';
    } else if(timeLeft <= Math.ceil(seconds*0.4)){
      fill.style.background = 'var(--amber)';
    } else {
      fill.style.background = 'var(--green)';
    }
  }
  if(text){
    text.textContent = `⏱ ${timeLeft}초`;
    text.className = 'timer-text';
    if(timeLeft <= 3) text.classList.add('danger');
    else if(timeLeft <= Math.ceil(seconds*0.4)) text.classList.add('warn');
  }
}

function onTimeout(){
  if(advancing || revealed[idx]) return;
  advancing = true;
  const q = questions[idx];
  const origIdx = ALL_Q.indexOf(q);
  results[origIdx] = {correct:false, userAns:'__timeout__', q};
  revealed[idx] = true;
  render();
  advancing = false;
}

function selectChoice(choice){
  if(revealed[idx] || advancing) return;
  advancing = true;
  clearInterval(timerInterval);
  const q = questions[idx];
  const origIdx = ALL_Q.indexOf(q);
  const correct = choice === q.answer;
  results[origIdx] = {correct, userAns:choice, q};
  revealed[idx] = true;
  render();
  advancing = false;
}

function pickWord(bankIdx){
  if(revealed[idx]) return;
  if(!wordPicks[idx]) wordPicks[idx] = [];
  if(wordPicks[idx].includes(bankIdx)) return;
  wordPicks[idx].push(bankIdx);
  render();
}

function unpickWord(pos){
  if(revealed[idx]) return;
  if(!wordPicks[idx]) return;
  wordPicks[idx].splice(pos, 1);
  render();
}

function submitOrder(){
  if(revealed[idx] || advancing) return;
  const picks = wordPicks[idx] || [];
  const bank = wordBanks[idx];
  if(picks.length < bank.length) return;
  advancing = true;
  clearInterval(timerInterval);
  const q = questions[idx];
  const userAns = picks.map(i => bank[i]).join(' ');
  const norm = s => s.toLowerCase().replace(/\s+/g,' ').replace(/[.!?]+$/,'').trim();
  const correct = norm(userAns) === norm(q.answer);
  const origIdx = ALL_Q.indexOf(q);
  results[origIdx] = {correct, userAns, q};
  revealed[idx] = true;
  render();
  advancing = false;
}

function nextQ(){
  if(idx < questions.length-1){
    idx++;
    initOrder();
    render();
    startTimer();
  } else {
    clearInterval(timerInterval);
    const totalAnswered = Object.keys(results).length;
    const correctCount = Object.values(results).filter(r=>r.correct).length;
    const duration = Math.round((Date.now() - startTime)/1000);
    saveHistoryEntry({
      date: new Date().toISOString(),
      total: totalAnswered,
      correct: correctCount,
      percent: Math.round(correctCount/totalAnswered*100),
      duration: duration,
      sections: [...selectedSections]
    });
    screen = 'result';
    render();
  }
}

function backToIntro(){
  if(!confirm('처음 화면으로 돌아갈까요? 진행 중인 답안은 저장되지 않습니다.')) return;
  clearInterval(timerInterval);
  screen = 'intro';
  render();
}

function render(){
  const app = document.getElementById('app');
  if(screen === 'intro') app.innerHTML = renderIntro();
  else if(screen === 'quiz') app.innerHTML = renderQuiz();
  else app.innerHTML = renderResult();
  attachEvents();
}

function renderQuiz(){
  const q = questions[idx];
  const done = revealed[idx];
  const result = done ? results[ALL_Q.indexOf(q)] : null;
  const progressPct = ((idx+1)/questions.length)*100;
  let typeLabel, typeCls;
  if(q.type === 'order'){ typeLabel = '유형 · 어순배열'; typeCls = 'order'; }
  else { typeLabel = '유형 · 객관식'; typeCls = 'choice'; }

  let body = '';
  if(q.type === 'choice') body = renderChoice(q, done, result);
  else body = renderOrder(q, done, result);

  const timerHTML = done ? '' : `
    <div class="timer-bar"><div class="timer-bar-fill" id="timer-fill" style="width:100%"></div></div>
    <div class="timer-text" id="timer-text">⏱ ${timeLeft}초</div>
  `;

  return `
<div class="quiz-top">
  <div class="q-counter"><strong>${idx+1}</strong> / ${questions.length}</div>
  <button class="exit-btn" id="exit">← 처음으로</button>
</div>
<div class="progress"><div class="progress-fill" style="width:${progressPct}%"></div></div>
${timerHTML}

<div class="q-card">
  <span class="type-badge ${typeCls}">${typeLabel}</span>
  <span class="q-source">${q.src}</span>
  ${body}
</div>

${done ? `<button class="next-btn" id="next">${idx < questions.length-1 ? '다음 문제 →' : '결과 보기 →'}</button>` : ''}
`;
}

function renderChoice(q, done, result){
  const koHTML = q.ko ? `<div class="q-ko-label">${q.ko}</div>` : '';
  const sentenceHTML = `<div class="q-sentence" style="white-space:pre-line">${renderBlank(q.sentence)}</div>`;
  return `
<div class="q-prompt">빈칸에 알맞은 것을 고르세요.</div>
${koHTML}
${sentenceHTML}
<div class="choices">
  ${q.choices.map((c,i)=>{
    let cls='choice-btn';
    if(done){
      if(c === q.answer) cls += ' correct';
      else if(result.userAns === c) cls += ' wrong';
    }
    const mark = String.fromCharCode(65+i);
    return `<button class="${cls}" data-choice="${escapeAttr(c)}" ${done?'disabled':''}>
      <span class="choice-mark">${mark}</span>
      <span>${c}</span>
    </button>`;
  }).join('')}
</div>
${done ? renderFeedback(result, q.answer, q.explain) : ''}
`;
}

function renderOrder(q, done, result){
  const bank = wordBanks[idx] || [];
  const picks = wordPicks[idx] || [];
  const allPicked = picks.length === bank.length;

  let contextHTML = '';
  if(q.before !== undefined || q.after !== undefined){
    contextHTML = `<div class="order-context">${q.before||''} <span class="context-blank"></span> ${q.after||''}</div>`;
  }

  let answerHTML;
  if(picks.length === 0){
    answerHTML = '<span class="empty-hint">아래 단어를 순서대로 탭하세요</span>';
  } else {
    answerHTML = picks.map((bi, pos)=>
      `<button class="picked-word" data-pick-pos="${pos}" ${done?'disabled':''}>${bank[bi]}</button>`
    ).join('');
  }

  const bankHTML = bank.map((w, bi)=>{
    const used = picks.includes(bi);
    return `<button class="word-btn ${used?'used':''}" data-bank-idx="${bi}" ${(used||done)?'disabled':''}>${w}</button>`;
  }).join('');

  const answerCls = done ? (result.correct?'correct':'wrong') : '';

  return `
<div class="q-prompt">${q.prompt||''}</div>
${contextHTML}
<div class="answer-area ${answerCls}">
  ${answerHTML}
</div>
<div class="word-bank">${bankHTML}</div>
${!done ? `<button class="submit-btn" id="submit-order" ${allPicked?'':'disabled'}>${allPicked?'정답 확인':`단어 ${bank.length-picks.length}개 더 선택`}</button>` : ''}
${done ? renderFeedback(result, q.answer, q.explain) : ''}
`;
}

function renderBlank(sentence){
  return sentence.replace(/___+/g, '<span class="blank-slot"></span>');
}

function escapeAttr(s){
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderFeedback(result, ans, explain){
  if(result.userAns === '__timeout__'){
    return `<div class="feedback timeout">
      <div class="feedback-title">⏱ 시간 초과 · 정답: <span class="correct-ans">${ans}</span></div>
      <div>${explain}</div>
    </div>`;
  }
  if(result.correct){
    return `<div class="feedback ok">
      <div class="feedback-title">✓ 정답!</div>
      <div>${explain}</div>
    </div>`;
  }
  return `<div class="feedback no">
    <div class="feedback-title">✗ 정답: <span class="correct-ans">${ans}</span></div>
    <div>${explain}</div>
  </div>`;
}

function renderResult(){
  const totalAnswered = Object.keys(results).length;
  const correctCount = Object.values(results).filter(r=>r.correct).length;
  const wrongCount = totalAnswered - correctCount;
  const pct = totalAnswered>0 ? Math.round(correctCount/totalAnswered*100) : 0;
  const duration = Math.round((Date.now() - startTime)/1000);

  let emoji = '🎉', msg = '훌륭해요!';
  if(pct < 60){ emoji = '💪'; msg = '한 번 더 복습해봐요!'; }
  else if(pct < 80){ emoji = '👍'; msg = '거의 다 왔어요!'; }
  else if(pct < 100){ emoji = '✨'; msg = '아주 잘했어요!'; }
  else { emoji = '🏆'; msg = '완벽해요!'; }

  const wrongList = Object.entries(results).filter(([k,r])=>!r.correct);
  let reviewHTML = '';
  if(wrongList.length > 0){
    reviewHTML = `<div class="review-title">오답 리뷰 (${wrongList.length}문항)</div>` +
      wrongList.map(([k,r])=>{
        const q = r.q;
        let qText = '';
        if(q.type === 'choice'){
          if(q.ko){
            qText = `<span style="color:var(--muted);font-size:11px;">${q.ko}</span><br>`;
          }
          qText += `<span style="white-space:pre-line">${renderBlank(q.sentence || '')}</span>`;
        } else {
          qText = (q.prompt||'') + '<br>';
          qText += `<span style="color:var(--muted);">${q.before||''} ___ ${q.after||''}</span>`;
        }
        const correctAns = q.answer;
        let userAnsDisplay;
        if(r.userAns === '__timeout__'){
          userAnsDisplay = '<span class="review-val timeout">⏱ 시간 초과</span>';
        } else {
          userAnsDisplay = `<span class="review-val wrong">${r.userAns}</span>`;
        }
        return `<div class="review-card">
          <div class="review-num">${q.src}</div>
          <div class="review-q">${qText}</div>
          <div class="review-ans">
            <span class="review-label">내 답</span>
            ${userAnsDisplay}
          </div>
          <div class="review-ans">
            <span class="review-label">정답</span>
            <span class="review-val correct">${correctAns}</span>
          </div>
          <div class="review-explain">${q.explain}</div>
        </div>`;
      }).join('');
  }

  return `
<div class="brand">리드림영어학원</div>
<div class="result-hero">
  <div class="result-emoji">${emoji}</div>
  <div class="result-msg">${msg}</div>
  <div class="result-score">${correctCount}<span class="total">/${totalAnswered}</span></div>
  <div class="result-percent">정답률 ${pct}%</div>
  <div class="result-time">소요 시간 ${formatDuration(duration)}</div>
</div>

${reviewHTML}

<button class="retry-btn" id="retry-all">새 문제로 다시 풀기</button>
${wrongCount>0 ? `<button class="review-wrong-only" id="retry-wrong">틀린 문제만 다시 풀기 (${wrongCount}문항)</button>` : ''}
<button class="home-btn" id="home">처음 화면으로</button>
`;
}

function attachEvents(){
  document.querySelectorAll('input[type="checkbox"][data-section]').forEach(cb=>{
    cb.onchange = ()=>{
      const k = cb.getAttribute('data-section');
      if(cb.checked){
        if(!selectedSections.includes(k)) selectedSections.push(k);
      } else {
        selectedSections = selectedSections.filter(s=>s!==k);
      }
      render();
    };
  });

  const inpTotal = document.getElementById('inp-total');
  if(inpTotal){
    inpTotal.onchange = ()=>{
      userTotal = Math.max(1, parseInt(inpTotal.value)||1);
      render();
    };
  }

  const startBtn = document.getElementById('start');
  if(startBtn) startBtn.onclick = start;

  const clearBtn = document.getElementById('clear-history');
  if(clearBtn) clearBtn.onclick = clearHistory;

  const exitBtn = document.getElementById('exit');
  if(exitBtn) exitBtn.onclick = backToIntro;

  document.querySelectorAll('.choice-btn').forEach(btn=>{
    btn.onclick = ()=>{
      const c = btn.getAttribute('data-choice');
      if(c !== null) selectChoice(c);
    };
  });

  document.querySelectorAll('.word-btn').forEach(btn=>{
    btn.onclick = ()=>{
      const bi = parseInt(btn.getAttribute('data-bank-idx'));
      if(!isNaN(bi)) pickWord(bi);
    };
  });

  document.querySelectorAll('.picked-word').forEach(btn=>{
    btn.onclick = ()=>{
      const pos = parseInt(btn.getAttribute('data-pick-pos'));
      if(!isNaN(pos)) unpickWord(pos);
    };
  });

  const submitOrderBtn = document.getElementById('submit-order');
  if(submitOrderBtn) submitOrderBtn.onclick = submitOrder;

  const nextBtn = document.getElementById('next');
  if(nextBtn) nextBtn.onclick = nextQ;

  const retryAll = document.getElementById('retry-all');
  if(retryAll) retryAll.onclick = start;

  const retryWrong = document.getElementById('retry-wrong');
  if(retryWrong) retryWrong.onclick = ()=>{
    const wrongQs = Object.entries(results).filter(([k,r])=>!r.correct).map(([k,r])=>r.q);
    if(wrongQs.length === 0) return;
    questions = shuffle(wrongQs);
    idx=0; results={}; revealed={};
    wordBanks={}; wordPicks={};
    advancing = false;
    startTime = Date.now();
    screen='quiz';
    initOrder();
    render();
    startTimer();
  };

  const homeBtn = document.getElementById('home');
  if(homeBtn) homeBtn.onclick = ()=>{ screen='intro'; render(); };
}

render();
</script>
</body>
</html>
